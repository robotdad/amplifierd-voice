<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Amplifier Voice favicon: microphone on dark background -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>
  <!-- Mic body -->
  <rect x="12" y="5" width="8" height="13" rx="4" fill="#818cf8"/>
  <!-- Mic stand arc -->
  <path d="M8 16 Q8 24 16 24 Q24 24 24 16" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <!-- Mic stand line -->
  <line x1="16" y1="24" x2="16" y2="28" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <!-- Base bar -->
  <line x1="11" y1="28" x2="21" y2="28" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
</svg>
